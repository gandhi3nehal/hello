name: AI Code Review

on: pull_request

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Important: allows the AI to see the full git diff

    - name: Install and Start Ollama
      run: |
        # 1. Install Ollama
        curl -fsSL https://ollama.com/install.sh | sh
        
        # 2. Start Ollama in the background
        ollama serve & 
        
        # 3. Wait for the server to wake up
        sleep 10 
        
        # 4. Pre-download the model (llama3.2 is faster for CI)
        ollama pull llama3.2

    - name: Run Code Review
      run: |
          PROMPT='Code review the changes below:'
          RESPONSE=$(ollama run codellama "$PROMPT\n$(gh pr diff $PR_NUMBER)")
          gh pr comment $PR_NUMBER --body "$RESPONSE"
      env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

